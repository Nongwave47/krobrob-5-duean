<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown 💖🌹</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Sacramento&display=swap" rel="stylesheet">
<style>
  body {
    font-family:'Kanit',sans-serif;
    color: #fff;
    text-align: center;
    padding: 30px 20px;
    background: linear-gradient(270deg, #ff9ccf, #ff80ab, #ff4d6d, #ff1c4d);
    background-size: 800% 800%;
    animation: valentineFlow 15s linear infinite;
    /* min-height: 100vh; ลบออก */
    overflow: auto; /* หรือไม่ต้องใส่ก็ได้ */
}

  @keyframes valentineFlow {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
  }

  header {
    margin-bottom: 40px;
  }

  .title {
    font-family:'Sacramento',cursive;
    font-size:72px;
    text-shadow:0 6px 20px rgba(0,0,0,0.3);
  }

  .subtitle {
    font-size:20px;
    opacity:0.9;
    margin-top:-4px;
  }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .event-card {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 25px 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  .event-card:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);
  }

  .event-card h2 {
    font-size: 22px;
    margin-bottom: 12px;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }

  .event-card p {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin: 0;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* Nav buttons */
  .nav-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 50px 0 30px;
  }

  .nav-btn {
    padding: 14px 32px;
    border-radius: 40px;
    background: linear-gradient(135deg,#ff758c,#ff7eb3,#ffb3c6);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-family: 'Kanit', sans-serif;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .nav-btn:hover {
    transform: scale(1.08) translateY(-2px);
    box-shadow: 0 14px 32px rgba(0,0,0,0.35);
  }

  /* Hearts animation */
  .heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    transform: rotate(45deg);
    bottom: -50px;
    animation: floatUp 5s linear infinite;
    opacity: 0.8;
  }

  .heart:before,
  .heart:after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: red;
    border-radius: 50%;
  }

  .heart:before { top: -10px; left: 0; }
  .heart:after { left: 10px; top: 0; }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(45deg); opacity: 0.8;}
    100% { transform: translateY(-700px) rotate(45deg); opacity: 0;}
  }
</style>
</head>
<body>

<header>
  <h1 class="title">Countdown 💖🌹</h1>
  <div class="subtitle">นับถอยหลังวันสำคัญของเรา 🥰</div>
</header>

<div class="grid-container" id="events-container">
  <!-- Countdown cards จะถูกสร้างโดย JS -->
</div>

<!-- ปุ่มย้อนกลับ / ถัดไป -->
<div class="nav-buttons">
  <a href="timeline.html" class="nav-btn">⬅️ ย้อนกลับ</a>
  <a href="letter.html" class="nav-btn">ถัดไป ➡️</a>
</div>

<script>
  const events = [
    { name: "New Year", date: new Date(2027,0,1) },
    { name: "6-Month Anniversary", date: new Date(2026,2,12) },
    { name: "7-Month Anniversary", date: new Date(2026,3,12) },
    { name: "Girlfriend Birthday", date: new Date(2026,5,28) },
    { name: "1-Year Anniversary", date: new Date(2026,8,12) },
    { name: "2-Year Anniversary", date: new Date(2027,8,12) },
    { name: "5-Year Anniversary", date: new Date(2030,8,12) },
    { name: "10-Year Anniversary", date: new Date(2035,8,12) }
  ];

  function updateCountdown() {
    const container = document.getElementById("events-container");
    container.innerHTML = "";
    const now = new Date();

    events.forEach(event => {
      const diff = event.date - now;
      let text;
      if(diff <= 0){
        text = "ถึงวันสำคัญแล้ว! 💖";
      } else {
        const days = Math.floor(diff / (1000*60*60*24));
        const hours = Math.floor((diff / (1000*60*60)) % 24);
        const minutes = Math.floor((diff / (1000*60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);
        text = `${days} วัน ${hours.toString().padStart(2,'0')} ชม ${minutes.toString().padStart(2,'0')} นาที ${seconds.toString().padStart(2,'0')} วินาที`;
      }

      const div = document.createElement("div");
      div.className = "event-card";
      div.innerHTML = `<h2>${event.name}</h2><p>${text}</p>`;
      container.appendChild(div);
    });
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();

  // สร้างหัวใจลอย
  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.width = heart.style.height = (10 + Math.random() * 20) + 'px';
    heart.style.animationDuration = (4 + Math.random() * 4) + 's';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }

  setInterval(createHeart, 300);
</script>

</body>
</html>
