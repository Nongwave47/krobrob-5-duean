<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าเซอร์ไพรส์สุดท้าย 💌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap');

body {
  margin: 0;
  padding: 0;
  font-family: 'Kanit', sans-serif;
  overflow: hidden;
  color: #880e4f;

  /* พื้นหลังไล่สีขยับ */
  background: linear-gradient(270deg, #ffd6e8, #ff9ccf, #ff80ab, #ff4081);
  background-size: 800% 800%;
  animation: gradientBG 20s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.container {
  max-width: 600px;
  margin: 50px auto;
  padding: 30px 20px;
  background: rgba(255,255,255,0.95);
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(255,64,129,0.4);
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 2em;
  margin-bottom: 20px;
  text-shadow: 1px 1px #ff4081;
}

p {
  font-size: 1.2em;
  margin: 15px 0;
  line-height: 1.5em;
}

.btn-group {
  margin-top: 25px;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 12px 25px;
  background: #ff4081;
  color: white;
  text-decoration: none;
  border-radius: 14px;
  font-weight: bold;
  box-shadow: 0 5px 15px rgba(255,64,129,0.4);
  transition: transform 0.1s, box-shadow 0.2s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(255,64,129,0.6);
}

/* Hearts animation */
.heart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  transform: rotate(45deg);
  top: 100%;
  animation: floatUp 5s linear infinite;
  opacity: 0.8;
  z-index: 1;
}

.heart:before,
.heart:after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: red;
  border-radius: 50%;
}

.heart:before {
  top: -10px;
  left: 0;
}

.heart:after {
  left: 10px;
  top: 0;
}

@keyframes floatUp {
  0% { transform: translateY(0) rotate(45deg); opacity: 0.8;}
  100% { transform: translateY(-700px) rotate(45deg); opacity: 0;}
}
</style>
</head>
<body>

<div class="container">
  <h1>💖 ขอบคุณที่อยู่ด้วยกัน 5 เดือน 💖</h1>
  <p>เราผ่านความคิดถึงและความหวานมาด้วยกัน ถึงแม้ยังไม่ได้เจอตัวจริง แต่ความรู้สึกของเราก็อบอุ่นเหมือนกันนะ 🥰</p>
  <p>ขอบคุณที่อยู่ด้วยกันทุกวัน หวังว่าเราจะได้เจอกันเร็ว ๆ นี้ 💌</p>
  <div class="btn-group">
    <a href="quiz.html" class="btn">ย้อนกลับ</a>
    <a href="index.html" class="btn">หน้าแรก</a>
  </div>
</div>

<script>
// สร้างหัวใจลอยขึ้น
function createHeart() {
  const heart = document.createElement('div');
  heart.classList.add('heart');
  heart.style.left = Math.random() * 100 + 'vw';
  heart.style.width = heart.style.height = (10 + Math.random() * 20) + 'px';
  heart.style.animationDuration = (3 + Math.random() * 3) + 's';
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
