<meta charset="UTF-8">

<title>Valentine Gallery 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Sacramento&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#ff5f9e;
    --soft:#ffe6f0;
    --glass:rgba(255,255,255,0.55);
    --border:rgba(255,255,255,0.4);
    --text:#333;
  }

  *{box-sizing:border-box;}

  body{
    margin:0;
    font-family:'Kanit',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#ff7eb3,#ff758c,#ffb6c1,#ffe6f0);
    background-size:400% 400%;
    animation:bgMove 18s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
  }

  @keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  h1.title{
    font-family: 'Sacramento', cursive;
    font-size:82px;
    margin:20px 0;
    text-align:center;
    color:#fff;
    text-shadow:
      0 10px 35px rgba(0,0,0,.35),
      0 0 25px rgba(255,255,255,.35);
    animation:float 3s ease-in-out infinite alternate;
  }

  @keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-10px);}
  }

  .gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:12px;
    width:90%;
    max-width:1000px;
    margin:20px auto;
  }

  .gallery img{
    width:100%;
    height:auto;
    object-fit:contain;
    border-radius:14px;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 5px 15px rgba(255,64,129,.3);
  }

  .gallery img:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(255,64,129,.5);
  }

  .btn-group{
    text-align:center;
    margin:20px 0;
  }

  .btn{
    display:inline-block;
    margin:10px;
    padding:16px 34px;
    border-radius:999px;
    font-size:17px;
    font-weight:600;
    text-decoration:none;
    color:#fff;
    background:linear-gradient(135deg,#ff4e89,#ff758c,#ffb6c1);
    box-shadow:0 12px 30px rgba(255,78,137,.45);
    transition:.3s ease;
  }

  .btn:hover{
    transform:translateY(-4px) scale(1.05);
    box-shadow:0 18px 40px rgba(255,78,137,.6);
  }

  /* Lightbox modal */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
}

  .modal-content{
    background:var(--glass);
    backdrop-filter:blur(22px);
    border-radius:24px;
    padding:15px;
    max-width:80%;
    text-align:center;
    position:relative;
    border:1px solid var(--border);
    box-shadow:
      0 30px 60px rgba(0,0,0,.2),
      inset 0 0 0 1px rgba(255,255,255,.2);
  }

  .modal-content img {
    max-width: 100%;  /* ลดจาก 100% → 60% ของ modal-content */
    max-height: 80vh; /* ไม่ให้สูงเกินหน้าจอ */
    border-radius: 16px;
}

  .closeModal{
    position:absolute;
    top:12px;
    right:16px;
    font-size:24px;
    font-weight:bold;
    color:#333;
    cursor:pointer;
  }

  @media(max-width:480px){
    h1.title{font-size:60px;}
    .btn{padding:12px 28px; font-size:15px;}
  }
</style>
</head>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="closeModal" id="closeModal">&times;</span>
    <img id="modalImg" src="">
  </div>
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modalImg');
const closeModal = document.getElementById('closeModal');

images.forEach(img => {
  img.addEventListener('click', () => {
    modal.style.display='flex';
    modalImg.src=img.src;
  });
});

closeModal.addEventListener('click', ()=> modal.style.display='none');
window.addEventListener('click', e => { if(e.target===modal) modal.style.display='none'; });
</script>
