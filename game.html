<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Pop 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Sacramento&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Kanit', sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(270deg, #ff9ccf, #ffd6e8, #ff80ab, #ff4081);
    background-size: 800% 800%;
    animation: gradientBG 20s ease infinite;
    color: #880e4f;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  @keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  h1.title {
    font-family: 'Sacramento', cursive;
    font-size: 82px;
    margin: 30px 0 10px 0;
    text-shadow: 0 10px 35px rgba(0,0,0,.35), 0 0 25px rgba(255,255,255,.35);
    animation: float 3s ease-in-out infinite alternate;
  }

  @keyframes float{
    from{transform:translateY(0);}
    to{transform:translateY(-10px);}
  }

  p {
    font-size: 1.2em;
    margin: 5px 0;
  }

  #heart {
    width: 150px;
    height: 150px;
    background: radial-gradient(circle at 30% 30%, #ff1744, #d50000);
    border-radius: 50%;
    margin: 50px auto;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    user-select: none;
    box-shadow: 0 0 20px #ff80ab, 0 0 40px #ff4081;
    position: relative;
  }

  #heart:active {
    transform: scale(0.8);
    box-shadow: 0 0 30px #ff1744, 0 0 50px #ff80ab;
  }

  #score, #timer {
    font-size: 24px;
    margin: 10px;
    font-weight: bold;
  }

  #message {
    display: none;
    font-size: 24px;
    color: #d500f9;
    margin-top: 20px;
  }

  /* ปุ่มแบบหน้า Happy 5 Months */
  .btn {
    display: inline-block;
    margin: 10px;
    padding: 16px 34px;
    border-radius: 999px;
    font-size: 17px;
    font-weight: 600;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(135deg,#ff4e89,#ff758c,#ffb6c1);
    box-shadow: 0 12px 30px rgba(255,78,137,.45);
    transition: .3s ease;
  }

  .btn:hover {
    transform: translateY(-4px) scale(1.05);
    box-shadow: 0 18px 40px rgba(255,78,137,.6);
  }

  @media(max-width:480px){
    h1.title{font-size:60px;}
    .btn{padding:12px 28px; font-size:15px;}
  }
</style>
</head>
<body>

<h1 class="title">Heart Pop 💖</h1>
<p>กดหัวใจให้เร็วที่สุดใน 10 วินาที!</p>
<div id="timer">เวลา: 10</div>
<div id="score">คะแนน: 0</div>
<div id="heart"></div>

<div id="message">
  <p>คุณทำได้แล้ว! 💌</p>
  <p id="finalScore"></p>
  <div>
    <a href="gallery.html" class="btn">ย้อนกลับ 🏠</a>
    <a href="" class="btn" onclick="startGame();return false;">เล่นอีกครั้ง 🔁</a>
    <a href="quiz.html" class="btn">หน้าถัดไป ➡️</a>
  </div>
</div>

<script>
let score = 0;
let time = 10;
let timerInterval;

const heart = document.getElementById('heart');
const scoreDisplay = document.getElementById('score');
const timerDisplay = document.getElementById('timer');
const message = document.getElementById('message');
const finalScore = document.getElementById('finalScore');

function startGame() {
    score = 0;
    time = 10;
    scoreDisplay.textContent = "คะแนน: 0";
    timerDisplay.textContent = "เวลา: 10";
    message.style.display = "none";
    heart.style.display = "block";

    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        time -= 1;
        timerDisplay.textContent = "เวลา: " + time;
        if(time <= 0){
            clearInterval(timerInterval);
            endGame();
        }
    }, 1000);
}

function endGame(){
    heart.style.display = "none";
    message.style.display = "block";
    finalScore.textContent = "คะแนนสุดท้าย: " + score + " 💖";
}

// กดหัวใจเพิ่มคะแนน
heart.addEventListener('click', () => {
    score++;
    scoreDisplay.textContent = "คะแนน: " + score;

    heart.style.transform = "scale(0.8)";
    setTimeout(() => heart.style.transform = "scale(1)", 100);
});

// เริ่มเกมครั้งแรก
startGame();
</script>

</body>
</html>
